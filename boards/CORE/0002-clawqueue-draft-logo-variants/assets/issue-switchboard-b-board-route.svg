<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Issue Switchboard B — Board Route</title>
  <desc id="desc">Internal exploratory ClawQueue logo draft. GitHub project columns with one issue routed into an agent run.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
