<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Dispatch Claw B — Arrow Hook</title>
  <desc id="desc">Internal exploratory ClawQueue logo draft. Amber claw stroke shaped into a dispatch arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111E"/><stop offset="1" stop-color="#0A1A2C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing:.12em; fill:#8EA0B8; text-transform:uppercase; }
      .word { font: 800 58px Barlow, Inter, system-ui, sans-serif; letter-spacing:-.035em; fill:#E8EDF5; }
      .sub { font: 500 18px "DM Sans", Inter, system-ui, sans-serif; fill:#8EA0B8; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#8EA0B8; }
      .tile { fill:#0B1728; stroke:#1D314A; stroke-width:2; }
      .smallTile { fill:#0B1728; stroke:#1E3653; stroke-width:1.5; }
    </style>
  </defs>
  <rect width="960" height="520" rx="34" fill="url(#bg)"/>
  <rect x="28" y="28" width="904" height="464" rx="28" fill="none" stroke="#142840"/>

  <text x="64" y="72" class="label">DISPATCH CLAW · B</text>
  <g filter="url(#soft)">
    <rect x="86" y="125" width="230" height="230" rx="46" class="tile"/>
    <path d="M145 282 C177 255 202 227 221 188" fill="none" stroke="#F59E0B" stroke-width="28" stroke-linecap="round"/>
    <path d="M221 188 L252 193 L232 158 Z" fill="#F59E0B"/>
    <path d="M162 296 L134 291 L154 260" fill="none" stroke="#F59E0B" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M178 300 L150 302 L166 270" fill="none" stroke="#FFD184" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/>
  </g>
    <text x="380" y="226" class="word">Claw<tspan fill="#F59E0B">Queue</tspan></text>
  <text x="384" y="268" class="sub">local GitHub issue dispatcher</text>
  <text x="384" y="318" class="mono">more directional: claw slash becomes a dispatch arrow</text>
  <g transform="translate(384 360)">
    <rect width="52" height="52" rx="12" class="smallTile"/><path d="M16 35 C25 28 32 20 36 11" fill="none" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/><path d="M36 11 L44 13 L39 4 Z" fill="#F59E0B"/>
    <rect x="76" y="8" width="36" height="36" rx="9" fill="#F59E0B"/><path d="M88 32 C95 26 101 19 104 13" fill="none" stroke="#07111E" stroke-width="5" stroke-linecap="round"/><path d="M104 13 L110 14 L107 7 Z" fill="#07111E"/>
    <text x="132" y="32" class="mono">strong motion; slightly less stable at tiny sizes</text>
  </g>
</svg>