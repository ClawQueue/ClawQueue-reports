<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Wildcard — Queue Bracket</title>
  <desc id="desc">Internal exploratory ClawQueue logo draft. Bracketed CQ monogram with queue bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111E"/><stop offset="1" stop-color="#0A1A2C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing:.12em; fill:#8EA0B8; text-transform:uppercase; }
      .word { font: 800 58px Barlow, Inter, system-ui, sans-serif; letter-spacing:-.035em; fill:#E8EDF5; }
      .sub { font: 500 18px "DM Sans", Inter, system-ui, sans-serif; fill:#8EA0B8; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#8EA0B8; }
      .tile { fill:#0B1728; stroke:#1D314A; stroke-width:2; }
      .smallTile { fill:#0B1728; stroke:#1E3653; stroke-width:1.5; }
    </style>
  </defs>
  <rect width="960" height="520" rx="34" fill="url(#bg)"/>
  <rect x="28" y="28" width="904" height="464" rx="28" fill="none" stroke="#142840"/>

  <text x="64" y="72" class="label">WILDCARD · QUEUE BRACKET</text>
  <g filter="url(#soft)">
    <rect x="86" y="125" width="230" height="230" rx="46" class="tile"/>
    <text x="126" y="270" style="font:800 92px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#E8EDF5; letter-spacing:-.12em">[C</text>
    <circle cx="229" cy="238" r="43" stroke="#F59E0B" stroke-width="16" fill="none"/>
    <path d="M251 262 L279 292" stroke="#F59E0B" stroke-width="16" stroke-linecap="round"/>
    <rect x="211" y="219" width="36" height="9" rx="4.5" fill="#317AE8"/>
    <rect x="211" y="238" width="28" height="9" rx="4.5" fill="#317AE8" opacity=".8"/>
    <rect x="211" y="257" width="20" height="9" rx="4.5" fill="#317AE8" opacity=".55"/>
    <text x="281" y="270" style="font:800 92px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#E8EDF5; letter-spacing:-.12em">]</text>
  </g>
    <text x="380" y="226" class="word">Claw<tspan fill="#F59E0B">Queue</tspan></text>
  <text x="384" y="268" class="sub">local GitHub issue dispatcher</text>
  <text x="384" y="318" class="mono">developer-native wildcard: bracketed CQ with queue bars inside Q</text>
  <g transform="translate(384 360)">
    <rect width="52" height="52" rx="12" class="smallTile"/><text x="7" y="35" style="font:800 28px ui-monospace, monospace; fill:#E8EDF5; letter-spacing:-.16em">[C</text><circle cx="33" cy="27" r="9" stroke="#F59E0B" stroke-width="4" fill="none"/><path d="M39 34 L45 41" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/><rect x="29" y="25" width="8" height="2.5" rx="1" fill="#317AE8"/>
    <rect x="76" y="8" width="36" height="36" rx="9" fill="#F59E0B"/><text x="82" y="31" style="font:800 18px ui-monospace, monospace; fill:#07111E; letter-spacing:-.14em">CQ</text>
    <text x="132" y="32" class="mono">clean for CLI; maybe too typographic/cold for main brand</text>
  </g>
</svg>